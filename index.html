<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>Recorrido Inmersivo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--gold:#e8b04b;}
html,body{width:100%;background:#000;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;}
#pin{position:relative;}
#stage{position:sticky;top:0;height:100vh;height:100dvh;overflow:hidden;background:#000;}
#cv{position:absolute;inset:0;width:100%;height:100%;display:block;}
.bar{position:absolute;left:0;right:0;height:6.5vh;background:#000;z-index:5;pointer-events:none;}
#barT{top:0;} #barB{bottom:0;}
#vig{position:absolute;inset:0;z-index:4;pointer-events:none;background:radial-gradient(ellipse at center,transparent 52%,rgba(0,0,0,.5) 100%);}
#fade{position:absolute;inset:0;background:#000;z-index:30;pointer-events:none;transition:opacity .6s ease;display:flex;flex-direction:column;gap:14px;align-items:center;justify-content:center;}
#fade .ld{color:#fff;font-size:12px;letter-spacing:3px;opacity:.75;}
#fade .lbar{width:min(240px,60vw);height:3px;background:rgba(255,255,255,.18);border-radius:2px;overflow:hidden;}
#fade .lbar i{display:block;height:100%;width:0%;background:var(--gold);transition:width .2s;}
#brand{position:absolute;top:calc(6.5vh + 16px);left:20px;z-index:10;color:#fff;text-shadow:0 2px 14px rgba(0,0,0,.7);}
#brand .n{font-size:clamp(14px,2.4vw,18px);font-weight:800;letter-spacing:4px;}
#brand .s{font-size:clamp(8px,1.4vw,10px);letter-spacing:2px;opacity:.8;text-transform:uppercase;margin-top:3px;}
#live{position:absolute;top:calc(6.5vh + 16px);right:20px;z-index:10;display:flex;align-items:center;gap:8px;color:#fff;font-size:11px;letter-spacing:2px;text-shadow:0 1px 8px rgba(0,0,0,.8);}
#live .dot{width:8px;height:8px;border-radius:50%;background:#e53935;animation:bl 1.4s infinite;}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.25}}
#hint{position:absolute;left:0;right:0;bottom:calc(6.5vh + 116px);z-index:10;text-align:center;color:#fff;font-size:clamp(10px,2.6vw,12px);letter-spacing:3px;opacity:.92;pointer-events:none;text-shadow:0 2px 10px rgba(0,0,0,.8);transition:opacity .6s;}
#hint span{display:block;font-size:22px;margin-top:8px;animation:bnc 1.6s infinite;}
@keyframes bnc{0%,100%{transform:translateY(0)}50%{transform:translateY(9px)}}
#hint.hide{opacity:0;}
#cap{position:absolute;left:0;right:0;bottom:calc(6.5vh + 92px);z-index:10;text-align:center;color:#fff;pointer-events:none;opacity:0;transform:translateY(14px);transition:opacity .8s ease,transform .8s ease;padding:0 14px;}
#cap.on{opacity:1;transform:translateY(0);}
#cap .t{font-size:clamp(20px,5.4vw,44px);font-weight:800;letter-spacing:5px;text-shadow:0 3px 20px rgba(0,0,0,.85);}
#cap .l{width:60px;height:2px;background:var(--gold);margin:10px auto;}
#cap .s{font-size:clamp(11px,2.8vw,16px);letter-spacing:1.5px;opacity:.92;text-shadow:0 2px 12px rgba(0,0,0,.9);}
#hud{position:absolute;left:0;right:0;bottom:0;z-index:20;padding:10px 14px calc(6.5vh + max(0px, env(safe-area-inset-bottom) - 10px));display:flex;flex-direction:column;gap:9px;background:linear-gradient(transparent,rgba(0,0,0,.6));transition:opacity .5s;}
html.idle #hud{opacity:0;pointer-events:none;}
#prog{position:relative;height:5px;background:rgba(255,255,255,.24);border-radius:3px;cursor:pointer;touch-action:none;}
#prog .fill{position:absolute;left:0;top:0;bottom:0;background:var(--gold);border-radius:3px;width:0%;}
#prog .mk{position:absolute;top:-3px;width:11px;height:11px;border-radius:50%;background:#fff;border:2px solid #0009;transform:translateX(-50%);cursor:pointer;}
#row{display:flex;align-items:center;gap:7px;flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding-bottom:2px;}
#row::-webkit-scrollbar{display:none;}
.cbtn{background:rgba(255,255,255,.14);backdrop-filter:blur(6px);color:#fff;border:1px solid rgba(255,255,255,.28);border-radius:22px;padding:8px 14px;font-size:12px;cursor:pointer;letter-spacing:.5px;white-space:nowrap;font-weight:600;flex:0 0 auto;}
.cbtn:hover{background:rgba(255,255,255,.3);}
.chp{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.2);color:#dcdcdc;border-radius:15px;padding:6px 11px;font-size:11px;cursor:pointer;white-space:nowrap;flex:0 0 auto;}
.chp:hover{background:rgba(232,176,75,.4);color:#fff;}
.chp.on{background:var(--gold);color:#1a1208;font-weight:700;border-color:var(--gold);}
#tm{color:#fff;font-size:11px;opacity:.85;min-width:78px;text-align:right;margin-left:auto;letter-spacing:1px;flex:0 0 auto;}
#after{background:#0b0e13;color:#fff;padding:90px 20px 110px;text-align:center;}
#after .n{font-size:clamp(26px,6vw,44px);font-weight:800;letter-spacing:7px;}
#after .l{width:74px;height:2px;background:var(--gold);margin:22px auto;}
#after .s{font-size:clamp(14px,3vw,16px);letter-spacing:2px;opacity:.88;margin-bottom:12px;}
#after .c{font-size:13px;opacity:.62;letter-spacing:1px;margin-bottom:34px;line-height:1.8;}
#after button{background:var(--gold);border:none;color:#1a1208;font-weight:700;font-size:14px;padding:13px 32px;border-radius:28px;cursor:pointer;letter-spacing:1px;}
#after button:hover{filter:brightness(1.1);}
#feats{display:flex;gap:20px 26px;justify-content:center;flex-wrap:wrap;margin:0 auto 40px;max-width:640px;}
#feats div{font-size:12px;letter-spacing:1px;opacity:.8;}
#feats b{display:block;font-size:22px;color:var(--gold);font-weight:800;margin-bottom:4px;letter-spacing:0;}
</style>
</head>
<body>
<div id="pin"><div id="stage">
  <canvas id="cv"></canvas>
  <div class="bar" id="barT"></div><div class="bar" id="barB"></div>
  <div id="vig"></div>
  <div id="brand"><div class="n">VISTA AL MAR</div><div class="s">Departamento frente al mar</div></div>
  <div id="live"><span class="dot"></span>TOUR</div>
  <div id="hint">DESLIZA PARA RECORRER<span>↓</span></div>
  <div id="cap"><div class="t"></div><div class="l"></div><div class="s"></div></div>
  <div id="hud">
    <div id="prog"><div class="fill"></div></div>
    <div id="row">
      <button class="cbtn" id="bPlay">▶ Auto</button>
      <button class="cbtn" id="bRst">↺</button>
      <span id="chips" style="display:contents"></span>
      <span id="tm">0:00 / 0:00</span>
    </div>
  </div>
  <div id="fade"><div class="ld">CARGANDO RECORRIDO…</div><div class="lbar"><i></i></div></div>
</div></div>
<section id="after">
  <div class="n">VISTA AL MAR</div><div class="l"></div>
  <div class="s">Tu departamento frente al mar te espera</div>
  <div id="feats"><div><b>2</b>Recamaras</div><div><b>1</b>Bano completo</div><div><b>360°</b>Vista</div><div><b>Full</b>Cocina equipada</div></div>
  <div class="c">Agenda tu visita presencial<br>ventas@vistaalmar.com · +52 55 0000 0000</div>
  <button id="bAgain">Volver al inicio del recorrido</button>
</section>

<script>
const INTRO_SECONDS = 10.0;   // 0 = sin intro automática
const CHAPTERS = [{"f": 0.0, "chip": "Entrada", "title": "BIENVENIDO", "sub": "Acceso principal con acabados premium"}, {"f": 0.15, "chip": "Cocina", "title": "COCINA", "sub": "Cocina integral totalmente equipada"}, {"f": 0.32, "chip": "Sala", "title": "SALA Y COMEDOR", "sub": "Concepto abierto con luz natural"}, {"f": 0.54, "chip": "Terraza", "title": "TERRAZA", "sub": "Balcon privado con vista"}, {"f": 0.66, "chip": "Pasillo", "title": "PASILLO", "sub": "Distribucion comoda hacia las recamaras"}, {"f": 0.84, "chip": "Recamara", "title": "RECAMARA PRINCIPAL", "sub": "Amplia suite con closet"}];

const html = document.documentElement;
const $ = id => document.getElementById(id);
const fill = document.querySelector('#prog .fill');
const pin = document.getElementById('pin');
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');

let FRAMES = null, N = 0, DUR = 10, scrollLen = 0, autoScroll = false;
const FPS = 12;
const PXPS = 550;             // px de scroll por segundo de video: más alto = recorrido más lento
const AUTO_SPEED = 0.45; // velocidad del modo Auto (1 = tiempo real del video)
const IS_MOBILE = Math.min(screen.width, screen.height) < 700;

/* ---------- carga con progreso: elige archivo según dispositivo ---------- */
(async function loadFrames(){
  // en celular intenta las variantes ligeras (con y sin guión); si no existen, usa la completa
  const candidates = IS_MOBILE ? ['frames-mobile.js', 'framesmobile.js', 'frames.js'] : ['frames.js'];
  const ld = document.querySelector('#fade .ld');
  const lb = document.querySelector('#fade .lbar i');
  let src = candidates[0];
  try {
    let res = null;
    for (const cand of candidates){
      try { res = await fetch(cand); } catch(e){ res = null; }
      if (res && res.ok){ src = cand; break; }
      res = null;
    }
    if (!res) throw new Error('sin archivo de frames');
    const total = +res.headers.get('Content-Length') || 0;
    let text;
    if (res.body && res.body.getReader){
      const reader = res.body.getReader();
      const chunks = []; let got = 0;
      while (true){
        const {done, value} = await reader.read();
        if (done) break;
        chunks.push(value); got += value.length;
        if (total){
          const pct = Math.round(got / total * 100);
          ld.textContent = 'CARGANDO RECORRIDO… ' + pct + '%';
          lb.style.width = pct + '%';
        }
      }
      const all = new Uint8Array(got);
      let off = 0; for (const c of chunks){ all.set(c, off); off += c.length; }
      text = new TextDecoder().decode(all);
    } else {
      text = await res.text();
    }
    (new Function(text + ';window.__FRAMES = FRAMES;'))();
    FRAMES = window.__FRAMES; delete window.__FRAMES;
    N = FRAMES.length; DUR = N / FPS;
    startTour();
  } catch(e){
    ld.textContent = 'No se pudo cargar el recorrido (' + src + ')';
  }
})();

/* ---------- motor del recorrido ---------- */
const imgs = [];
let loaded = 0, imgW = 960, imgH = 540, lastDrawn = -1, started = false;

function startTour(){
  if (started) return; started = true;
  layout();
  for (let i = 0; i < N; i++){
    const im = new Image();
    im.onload = () => {
      if (i === 0){ imgW = im.naturalWidth; imgH = im.naturalHeight; resize(); draw(0); }
      loaded++;
      if (loaded === Math.min(N, Math.ceil(N * 0.25))){   // suficiente para empezar
        $('fade').style.opacity = 0;
        if (INTRO_SECONDS > 0) startIntro();
      }
    };
    im.src = FRAMES[i]; imgs[i] = im;
  }
  buildChips();
}

function nearestLoaded(idx){
  if (imgs[idx] && imgs[idx].complete && imgs[idx].naturalWidth) return idx;
  for (let d = 1; d < N; d++){
    if (idx-d >= 0 && imgs[idx-d] && imgs[idx-d].complete && imgs[idx-d].naturalWidth) return idx-d;
    if (idx+d < N && imgs[idx+d] && imgs[idx+d].complete && imgs[idx+d].naturalWidth) return idx+d;
  }
  return -1;
}
function draw(idx){
  idx = Math.max(0, Math.min(N - 1, Math.round(idx)));
  const use = nearestLoaded(idx);
  if (use < 0) return;
  const im = imgs[use];
  lastDrawn = idx;
  const cw = cv.width, ch = cv.height, s = Math.max(cw / imgW, ch / imgH);
  const w = imgW * s, h = imgH * s;
  ctx.drawImage(im, (cw - w) / 2, (ch - h) / 2, w, h);
}
function layout(){ scrollLen = DUR * PXPS; pin.style.height = (scrollLen + innerHeight) + 'px'; }
function resize(){
  const dpr = Math.min(devicePixelRatio || 1, 2);
  cv.width = Math.round(innerWidth * dpr); cv.height = Math.round(innerHeight * dpr);
  const f = scrollLen ? window.scrollY / scrollLen : 0; layout();
  if (N) draw(Math.max(0, Math.min(1, f)) * (N - 1));
}
function fmt(s){ s = Math.max(0, Math.round(s)); return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }

function buildChips(){
  CHAPTERS.forEach(c => {
    const b = document.createElement('button');
    b.className = 'chp'; b.textContent = c.chip;
    b.onclick = () => scrollToFrac(c.f + 0.005);
    $('chips').appendChild(b); c.btn = b;
    const m = document.createElement('div'); m.className = 'mk';
    m.style.left = (c.f * 100) + '%'; m.title = c.chip; $('prog').appendChild(m);
  });
}
function scrollToFrac(f){ stopIntro(); autoScroll = false; setPlay(); window.scrollTo({top: Math.max(0,Math.min(1,f))*scrollLen, behavior:'smooth'}); }
let curChapter = -1;
function updateCaption(frac){
  if (!CHAPTERS.length || !CHAPTERS[0].btn) return;
  let ci = 0; for (let i=0;i<CHAPTERS.length;i++) if (frac >= CHAPTERS[i].f-0.005) ci=i;
  if (ci !== curChapter){
    curChapter = ci; const c = CHAPTERS[ci], cap = $('cap'); cap.classList.remove('on');
    setTimeout(()=>{ cap.querySelector('.t').textContent=c.title; cap.querySelector('.s').textContent=c.sub; cap.classList.add('on'); },70);
    CHAPTERS.forEach(x=>x.btn.classList.toggle('on', x===c));
  }
}
function setPlay(){ $('bPlay').textContent = autoScroll ? '⏸ Auto' : '▶ Auto'; }
$('bPlay').onclick = () => { stopIntro(); autoScroll=!autoScroll; if (autoScroll && window.scrollY>=scrollLen-2) window.scrollTo({top:0}); setPlay(); };
$('bRst').onclick = () => scrollToFrac(0);
$('bAgain').onclick = () => scrollToFrac(0);
function seekFromEvent(e){
  const r = $('prog').getBoundingClientRect();
  const x = (e.touches ? e.touches[0].clientX : e.clientX);
  scrollToFrac((x - r.left) / r.width);
}
$('prog').addEventListener('pointerdown', seekFromEvent);
['wheel','touchstart','keydown'].forEach(ev => addEventListener(ev, () => { stopIntro(); if (autoScroll){ autoScroll=false; setPlay(); } }, {passive:true}));

let idleT, scrolled = false;
function poke(){ html.classList.remove('idle'); clearTimeout(idleT); idleT=setTimeout(()=>html.classList.add('idle'),3400); }
addEventListener('pointermove', poke); addEventListener('pointerdown', poke); addEventListener('touchstart', poke, {passive:true}); poke();
addEventListener('scroll', () => { if (!scrolled && window.scrollY>20){ scrolled=true; $('hint').classList.add('hide'); } }, {passive:true});

/* intro: auto-avanza el recorrido los primeros segundos, luego cede al scroll */
let introActive = false, introT0 = 0;
function startIntro(){ introActive = true; introT0 = performance.now(); }
function stopIntro(){ introActive = false; }

let target = 0, cur = 0;
function loop(){
  requestAnimationFrame(loop);
  if (!started) return;
  if (introActive){
    const el = (performance.now() - introT0) / 1000;
    const f = Math.min(1, el / INTRO_SECONDS);
    window.scrollTo({top: f * scrollLen});
    if (f >= 1){ introActive = false; window.scrollTo({top: 0, behavior: 'smooth'}); } // vuelve al inicio para explorar
  } else if (autoScroll){
    const next = window.scrollY + (1/60)*PXPS*AUTO_SPEED;
    if (next >= scrollLen-1){ window.scrollTo({top:scrollLen}); autoScroll=false; setPlay(); }
    else window.scrollTo({top: next});
  }
  const frac = scrollLen ? Math.max(0,Math.min(1, window.scrollY/scrollLen)) : 0;
  target = frac * (N-1);
  cur += (target-cur) * 0.22;
  if (Math.abs(target-cur) < 0.02) cur = target;
  const idx = Math.round(cur); if (idx !== lastDrawn) draw(idx);
  fill.style.width = (frac*100)+'%';
  $('tm').textContent = fmt(frac*DUR)+' / '+fmt(DUR);
  updateCaption(frac);
}
addEventListener('resize', resize);
resize(); requestAnimationFrame(loop);
</script>
</body>
</html>
